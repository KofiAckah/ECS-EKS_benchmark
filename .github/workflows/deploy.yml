name: Deploy (ECS + EKS)

# Manual-only deploy of a chosen image tag to both orchestrators. Kept manual
# (not auto-on-push) so deploys are deliberate and never run unattended. CI
# (ci.yml) still builds & pushes images on every push; this rolls them out.
#
# Backend config is passed INLINE from repo vars (no backend.hcl file needed in
# CI). The state key comes from each module's backend{} block.
#
# NOTE: the EKS step uses the CI IAM role (AWS_ROLE_ARN). For `kubectl` to work
# that role must be a cluster access entry (the cluster creator has admin by
# default). Add one if you enable the EKS step for the CI role.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag (git SHA) to deploy
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  PROJECT: shopnow
  TAG: ${{ inputs.image_tag }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      # ---- ECS: re-register task defs with the new image via Terraform ----
      - name: Deploy to ECS
        working-directory: terraform/ecs
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
          terraform apply -auto-approve -input=false \
            -var="state_bucket=${STATE_BUCKET}" \
            -var="image_tag=${TAG}"

      # ---- EKS: point kustomize at the new image and roll the Deployments ----
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${PROJECT}-eks" --region "${AWS_REGION}"

      - name: Deploy to EKS
        working-directory: kubernetes
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          kustomize edit set image \
            "shopnow/backend=${REGISTRY}/${PROJECT}/backend:${TAG}" \
            "shopnow/frontend=${REGISTRY}/${PROJECT}/frontend:${TAG}"
          kubectl apply -k .
          kubectl -n shopnow rollout status deploy/backend --timeout=180s
          kubectl -n shopnow rollout status deploy/frontend --timeout=180s
