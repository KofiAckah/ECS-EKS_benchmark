apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopnow
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx-unprivileged
      containers:
        - name: frontend
          image: shopnow/frontend:latest # overridden by kustomize (git SHA)
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_HOST
              valueFrom: { configMapKeyRef: { name: shopnow-config, key: BACKEND_HOST } }
            - name: BACKEND_PORT
              valueFrom: { configMapKeyRef: { name: shopnow-config, key: BACKEND_PORT } }
            - name: DNS_RESOLVER
              valueFrom: { configMapKeyRef: { name: shopnow-config, key: DNS_RESOLVER } }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          # Root FS stays writable: the nginx entrypoint renders the config
          # template into /etc/nginx/conf.d at startup.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopnow
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: shopnow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
---
# ALB Ingress — provisioned by the AWS Load Balancer Controller. target-type ip
# is REQUIRED on Fargate (pods are ENIs, not node-backed NodePorts).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnow
  namespace: shopnow
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
