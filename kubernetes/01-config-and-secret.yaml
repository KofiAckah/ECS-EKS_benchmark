# Non-secret runtime config. The backend host here is the Kubernetes Service
# DNS name — the EKS equivalent of ECS Cloud Map. This is the service-discovery
# seam: same images, different BACKEND_HOST per platform.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopnow-config
  namespace: shopnow
data:
  DB_HOST: "postgres"          # ClusterIP Service DNS (postgres.shopnow.svc.cluster.local)
  DB_PORT: "5432"
  DB_NAME: "shopnow"
  DB_USER: "shopnow"
  REDIS_URL: "redis://redis:6379"
  CACHE_TTL_SECONDS: "30"
  BACKEND_HOST: "backend"      # frontend → backend via ClusterIP DNS
  BACKEND_PORT: "8080"
  # In-cluster DNS (CoreDNS) ClusterIP. For Fargate, nginx needs an explicit
  # resolver; kube-dns is conventionally 10.100.0.10 (overwrite if your service
  # CIDR differs: kubectl -n kube-system get svc kube-dns).
  DNS_RESOLVER: "10.100.0.10"
---
# DEMO secret only. In a real deployment this is synced from AWS Secrets Manager
# (e.g. External Secrets Operator) and never committed. Value is base64("shopnow").
apiVersion: v1
kind: Secret
metadata:
  name: shopnow-db
  namespace: shopnow
type: Opaque
data:
  DB_PASSWORD: c2hvcG5vdw==
  POSTGRES_PASSWORD: c2hvcG5vdw==
