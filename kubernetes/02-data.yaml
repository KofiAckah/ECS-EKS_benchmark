# Postgres + Redis as in-cluster Deployments (symmetric with the ECS setup).
# Ephemeral storage — fine for the lab/benchmark; production would use RDS +
# ElastiCache. Each gets a ClusterIP Service so the backend resolves them by name.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: shopnow
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: shopnow-config, key: DB_USER } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: shopnow-config, key: DB_NAME } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: shopnow-db, key: POSTGRES_PASSWORD } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "shopnow", "-d", "shopnow"] }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "500m", memory: "1Gi" }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: shopnow
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shopnow
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shopnow
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
